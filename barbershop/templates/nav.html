{% load static %}
<!-- Sidebar + logo + liens -->
<style>
.sidebar {
    width: 250px;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
    background: #1f2937;
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between; /* espace entre liens et déconnexion */
    padding: 20px 0;
}

.sidebar .logo {
    text-align: center;
    margin-bottom: 20px;
}

.sidebar .logo img {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #6c5ce7;
}

.sidebar a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 12px 20px;
    margin-bottom: 5px;
}

.sidebar a:hover {
    background: #374151;
    border-radius: 5px;
}

.sidebar .logout {
    color: #f87171;
    margin-top: auto; /* pousse en bas */
}

.sidebar .logout:hover {
    background: #b91c1c;
    border-radius: 5px;
}
</style>

<div class="sidebar">
    <div>
        <div class="logo">
            {% if salon.logo %}
                <img src="{{ salon.logo.url }}" alt="Logo Salon">
            {% else %}
                <img src="{% static 'logos/default_logo.png' %}" alt="Logo Salon">
            {% endif %}
        </div>

        {% if request.user.is_authenticated %}
            {% if request.user.role == 'admin' %}
                <a href="{% url 'dashboard' %}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
                <a href="{% url 'settings_salon' %}"><i class="bi bi-gear me-2"></i> Settings</a>
            {% endif %}
            <a href="{% url 'clients_crud' %}"><i class="bi bi-people me-2"></i> Clients</a>
            <a href="{% url 'services_crud' %}"><i class="bi bi-card-list me-2"></i> Services</a>
            <a href="{% url 'file_attente_crud' %}"><i class="bi bi-list-task me-2"></i> File d'attente</a>
            <a href="{% url 'paiements_crud' %}"><i class="bi bi-cash-stack me-2"></i> Paiements</a>
        {% endif %}
    </div>

    {% if request.user.is_authenticated %}
        <a href="{% url 'logout' %}" class="logout"><i class="bi bi-box-arrow-right me-2"></i> Déconnexion</a>
    {% endif %}
</div>
