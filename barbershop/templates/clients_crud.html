<!-- templates/clients_crud.html -->
{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mt-5">
    <h2>Gestion des Clients</h2>

    <!-- Bouton Ajouter Client -->
    <button class="btn btn-primary mb-3" id="btnAddClient">Ajouter Client</button>

    <!-- Tableau Clients -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Nom</th>
                <th>Prénom</th>
                <th>Téléphone</th>
                <th>Adresse</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="clientsTable">
            {% for client in clients %}
            <tr id="client-{{ client.id }}">
                <td>{{ client.nom }}</td>
                <td>{{ client.prenom }}</td>
                <td>{{ client.telephone }}</td>
                <td>{{ client.adresse }}</td>
                <td>
                    <button class="btn btn-sm btn-info btnEdit" data-id="{{ client.id }}">Modifier</button>
                    <button class="btn btn-sm btn-danger btnDelete" data-id="{{ client.id }}">Supprimer</button>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

<!-- Modal Formulaire Client -->
<div class="modal fade" id="clientModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="clientForm">
        {% csrf_token %}
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Ajouter Client</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
            <input type="hidden" name="client_id" id="client_id">
            <div class="mb-3">
                <label>Nom</label>
                <input type="text" name="nom" id="nom" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Prénom</label>
                <input type="text" name="prenom" id="prenom" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Téléphone</label>
                <input type="text" name="telephone" id="telephone" class="form-control">
            </div>
            <div class="mb-3">
                <label>Adresse</label>
                <input type="text" name="adresse" id="adresse" class="form-control">
            </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success" id="btnSave">Enregistrer</button>
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annuler</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function(){

    const clientModal = new bootstrap.Modal(document.getElementById('clientModal'));
    const form = document.getElementById("clientForm");

    // Ajouter client
    document.getElementById("btnAddClient").addEventListener("click", function(){
        document.getElementById("modalTitle").innerText = "Ajouter Client";
        form.reset();
        document.getElementById("client_id").value = "";
        clientModal.show();
    });

    // Modifier client
    document.querySelectorAll(".btnEdit").forEach(btn=>{
        btn.addEventListener("click", function(){
            const tr = this.closest("tr");
            const clientId = this.dataset.id;
            document.getElementById("modalTitle").innerText = "Modifier Client";
            document.getElementById("client_id").value = clientId;
            document.getElementById("nom").value = tr.children[0].innerText;
            document.getElementById("prenom").value = tr.children[1].innerText;
            document.getElementById("telephone").value = tr.children[2].innerText;
            document.getElementById("adresse").value = tr.children[3].innerText;
            clientModal.show();
        });
    });

    // Supprimer client
    document.querySelectorAll(".btnDelete").forEach(btn=>{
        btn.addEventListener("click", function(){
            if(!confirm("Voulez-vous vraiment supprimer ce client ?")) return;
            const clientId = this.dataset.id;
            fetch("{% url 'clients_crud' %}", {
                method: "DELETE",
                headers: {'X-CSRFToken': '{{ csrf_token }}', 'Content-Type': 'application/json'},
                body: JSON.stringify({client_id: clientId})
            }).then(res=>res.json()).then(data=>{
                if(data.status==="deleted"){
                    document.getElementById("client-"+clientId).remove();
                    alert("Client supprimé !");
                }
            });
        });
    });

    // Soumettre formulaire AJAX
    form.addEventListener("submit", function(e){
        e.preventDefault();
        const formData = new FormData(form);
        fetch("{% url 'clients_crud' %}", {
            method: "POST",
            body: formData,
        }).then(res=>res.json()).then(data=>{
            if(data.status==="success"){
                location.reload(); // recharge la page pour simplifier
            }else{
                alert("Erreur: "+JSON.stringify(data.errors));
            }
        });
    });

});
</script>
{% endblock %}
