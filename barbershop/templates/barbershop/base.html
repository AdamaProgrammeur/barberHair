<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BarberHair{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Optionnel : Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* Sidebar */
        body {
            display: flex;
            min-height: 100vh;
        }
        #sidebar {
            min-width: 220px;
            max-width: 220px;
            background-color: #343a40;
            color: white;
        }
        #sidebar .nav-link {
            color: white;
        }
        #sidebar .nav-link.active {
            background-color: #495057;
        }
        #content {
            flex: 1;
            padding: 20px;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<div id="sidebar" class="d-flex flex-column p-3">
    <h3 class="text-center">BarberHair</h3>
    <hr>
    <ul class="nav nav-pills flex-column mb-auto">
        <li class="nav-item">
            <a href="{% url 'clients' %}" class="nav-link {% if request.path == '/clients/' %}active{% endif %}">
                <i class="bi bi-people-fill"></i> Clients
            </a>
        </li>
        <li>
            <a href="#" class="nav-link">
                <i class="bi bi-scissors"></i> Services
            </a>
        </li>
        <li>
            <a href="#" class="nav-link">
                <i class="bi bi-list-task"></i> File d'attente
            </a>
        </li>
        <li>
            <a href="#" class="nav-link">
                <i class="bi bi-cash-stack"></i> Paiements
            </a>
        </li>
        <li>
            <a href="#" class="nav-link">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
        </li>
    </ul>
</div>

<!-- Main content -->
<div id="content">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
